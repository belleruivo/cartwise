name: cartwise
description: Gestão inteligente de compras
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # Icons
  lucide_icons: ^0.257.0
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - images/grupo.jpg
